services:
  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: salamhack-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"
      SA_PASSWORD: "${SA_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "${SQL_PORT:-14333}:1433"
    volumes:
      - "${volume1:-sql_data:/var/opt/mssql}"
      - "${volume2:-sql_backups:/var/opt/mssql/backups}"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/1433' >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    restart: unless-stopped
    networks: [salamhack-net]

  seq:
    image: datalust/seq:latest
    container_name: salamhack-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: "${SEQ_ADMIN_PASSWORD}"
    ports:
      - "${SEQ_BIND_ADDRESS:-127.0.0.1}:${SEQ_PORT:-5341}:80"
    volumes:
      - seq_data:/data
    restart: unless-stopped
    networks: [salamhack-net]

  otel-collector:
    image: otel/opentelemetry-collector:0.98.0
    container_name: salamhack-otel
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4317:4317"
      - "8889:8889"
    restart: unless-stopped
    networks: [salamhack-net]

  prometheus:
    image: prom/prometheus:latest
    container_name: salamhack-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_BIND_ADDRESS:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      otel-collector:
        condition: service_started
    restart: unless-stopped
    networks: [salamhack-net]

  grafana:
    image: grafana/grafana-oss:latest
    container_name: salamhack-grafana
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in the server .env}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_LOG_LEVEL: "info"
    ports:
      - "${GRAFANA_BIND_ADDRESS:-127.0.0.1}:${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped
    networks: [salamhack-net]

  api:
    image: ghcr.io/at128/salamhack-api:latest
    container_name: salamhack-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=SalamHackDb;User Id=sa;Password=${SA_PASSWORD};Encrypt=False;TrustServerCertificate=True;"
      DatabaseMigration__Enabled: "true"
      DatabaseMigration__LegacyCompatibilityEnabled: "true"
      DatabaseMigration__LegacyScriptPath: "deploy.sql"
      JWT__Secret: "${JWT_SECRET}"
      JWT__Issuer: "SalamHackApi"
      JWT__Audience: "SalamHackClient"
      JWT__ExpiryMinutes: "15"
      RefreshToken__ExpiryDays: "7"
      RefreshToken__TokenBytes: "64"
      CookieSettings__SecureOnly: "false"
      DataProtection__KeysPath: "/app/.aspnet/DataProtection-Keys"
      Swagger__Enabled: "true"
      Monitoring__AllowAnonymousHealthEndpoints: "true"
      Serilog__WriteTo__1__Args__serverUrl: "http://seq"
      OpenTelemetry__Enabled: "true"
      OpenTelemetry__ServiceName: "SalamHack.Api"
      OpenTelemetry__ServiceVersion: "1.0.0"
      OpenTelemetry__OtlpEndpoint: "http://otel-collector:4317"
      MailSettings__Host: "${MAIL_HOST}"
      MailSettings__Port: "${MAIL_PORT}"
      MailSettings__User: "${MAIL_USER}"
      MailSettings__Password: "${MAIL_PASSWORD}"
      MailSettings__FromEmail: "${MAIL_FROM_ADDRESS}"
      MailSettings__FromName: "${MAIL_FROM_NAME}"
    expose:
      - "8080"
    volumes:
      - data_protection_keys:/app/.aspnet/DataProtection-Keys
    depends_on:
      sqlserver:
        condition: service_healthy
      seq:
        condition: service_started
      otel-collector:
        condition: service_started
    restart: unless-stopped
    networks: [salamhack-net]

  client:
    image: ghcr.io/at128/salamhack-client:latest
    container_name: salamhack-client
    ports:
      - "${API_HTTP_PORT:-5009}:80"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    networks: [salamhack-net]

volumes:
  sql_data:
  sql_backups:
  seq_data:
  data_protection_keys:
  prometheus_data:
  grafana_data:

networks:
  salamhack-net:
    driver: bridge
